name: ci

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast lane — parse release-please config and enforce the basic repo
  # hygiene that doesn't need a macOS runner. Runs on every push.
  lint-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release-please config JSON
        run: |
          python3 -c "import json,sys; json.load(open('.release-please-config.json'))"
          python3 -c "import json,sys; json.load(open('.release-please-manifest.json'))"

      - name: Check README links
        run: |
          # English README references docs/screenshots/en/*.png,
          # Korean README references docs/screenshots/ko/*.png.
          en_shots="Dayflow-macOS/docs/screenshots/en"
          ko_shots="Dayflow-macOS/docs/screenshots/ko"
          for shot in day week month settings; do
            for lang_dir in "$en_shots" "$ko_shots"; do
              p="${lang_dir}/${shot}.png"
              if [ ! -e "$p" ]; then
                echo "::error::${p} is missing"; exit 1
              fi
            done
            if ! grep -q "${en_shots}/${shot}.png" README.md; then
              echo "::warning::README.md does not reference ${en_shots}/${shot}.png"
            fi
            if ! grep -q "${ko_shots}/${shot}.png" README.ko.md; then
              echo "::warning::README.ko.md does not reference ${ko_shots}/${shot}.png"
            fi
          done
          for doc in CONTRIBUTING.md README.ko.md; do
            if [ ! -e "$doc" ]; then
              echo "::error::${doc} is missing"; exit 1
            fi
          done
          if ! grep -q "CONTRIBUTING.md" README.md; then
            echo "::warning::README.md does not link to CONTRIBUTING.md"
          fi

      - name: Verify .gitignore keeps personal data out
        run: |
          for pattern in dayflow.db .env "*.pem" "*.key"; do
            if ! grep -qF "$pattern" .gitignore; then
              echo "::error::.gitignore missing $pattern"; exit 1
            fi
          done

  # Main lane — actually compile the macOS target. Warnings are promoted to
  # errors so future commits can't sneak in "variable never mutated" or
  # invalid-escape regressions the way `hkID` did.
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for icon renderer)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python3 -m pip install --upgrade pip && python3 -m pip install Pillow

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true
          sw_vers

      - name: swift build (release, warnings as errors)
        working-directory: Dayflow-macOS
        run: |
          swift build -c release -Xswiftc -warnings-as-errors

      - name: swift test
        working-directory: Dayflow-macOS
        run: |
          # The project has no test target yet. When one is added, this step
          # fails loud if tests start regressing. Until then, surface a
          # notice so we don't forget to wire it up.
          if swift package describe --type text 2>/dev/null | grep -q "test"; then
            swift test -c release
          else
            echo "::notice::no test target yet — add one to Package.swift"
          fi

      - name: End-to-end bundle check
        working-directory: Dayflow-macOS
        run: |
          ./build.sh
          test -f Dayflow.app/Contents/MacOS/DayflowApp
          test -f Dayflow.app/Contents/Resources/Dayflow.icns
          test -f Dayflow.app/Contents/Info.plist
          # Confirm the version was actually injected — a regression that
          # leaves a literal `${APP_VERSION}` in the plist would otherwise
          # slip through.
          if grep -q '\${APP_VERSION}' Dayflow.app/Contents/Info.plist; then
            echo "::error::Info.plist still has unexpanded \${APP_VERSION} placeholder"
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" \
            Dayflow.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" \
            Dayflow.app/Contents/Info.plist
